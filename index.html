<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Career Copilot AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2 class="logo">Copilot AI</h2>

    <a href="#">Dashboard</a>
    <a href="#">Profile</a>
    <a href="#">Skill Analysis</a>
    <a href="#">Roadmap</a>
    <a href="#">Daily Tasks</a>
    <a href="#">Mock Interview</a>
    <a href="#">Resume Review</a>
    <a href="#">Certifications</a>
    <a href="#">Projects</a>
    <a href="#">Progress</a>
    <a href="#">Achievements</a>
    <a href="#">Settings</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <input type="text" placeholder="Search..." />
      <div class="icons">
        🔔
        <img src="https://i.pravatar.cc/40" />
      </div>
    </div>

    <!-- HERO -->
    <div class="hero">
      <div class="hero-card">
        <h1>Career Score</h1>
        <div class="score-circle">
          <span>78%</span>
        </div>
        <p>AI-powered skill analysis in progress</p>
      </div>

      <div class="hero-image">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png"/>
      </div>
    </div>

    <!-- ROW 2 -->
    <div class="grid-3">
      <div class="card">Skill Gap Analysis</div>
      <div class="card">Career Roadmap</div>
      <div class="card">AI Interview Coach</div>
    </div>

    <!-- ROW 3 -->
    <div class="grid-2">
      <div class="card">Certifications</div>
      <div class="card">Recommendations</div>
    </div>

  </div>

</div>

</body>
</html>
